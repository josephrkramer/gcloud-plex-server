name: Plex Startup

on:
  workflow_dispatch:
    inputs:
      zone:
        description: 'Google Cloud Zone'
        required: true
        default: 'us-east1-b'
        type: choice
        options:
          - us-east1-b
          - us-east1-c
          - us-east1-d
          - us-east4-a
          - us-east4-b
          - us-east4-c
          - us-east5-a
          - us-east5-b
          - us-east5-c
          - us-central1-a
          - us-central1-b
          - us-central1-c
          - us-central1-f
          - us-south1-a
          - us-south1-b
          - us-south1-c
          - us-west1-a
          - us-west1-b
          - us-west1-c
          - us-west2-a
          - us-west2-b
          - us-west2-c
          - us-west3-a
          - us-west3-b
          - us-west3-c
          - us-west4-a
          - us-west4-b
          - us-west4-c
      machine_type:
        description: 'Google Cloud Machine Type'
        required: true
        default: 'e2-standard-4'
        type: string
      disk_type:
        description: 'Google Cloud Disk Type'
        required: true
        default: 'pd-balanced'
        type: string
      disk_size:
        description: 'Google Cloud Disk Size (GB)'
        required: true
        default: '60'
        type: string
      network:
        description: 'Google Cloud Network'
        required: true
        default: 'default'
        type: string
      network_tier:
        description: 'Google Cloud Network Tier'
        required: true
        default: 'PREMIUM'
        type: choice
        options:
          - PREMIUM
          - STANDARD
      service_account:
        description: 'Google Cloud Service Account'
        required: true
        default: '453460631559-compute@developer.gserviceaccount.com'
        type: string
      scopes:
        description: 'Google Cloud Service Account Scopes'
        required: true
        default: 'https://www.googleapis.com/auth/devstorage.read_only,https://www.googleapis.com/auth/logging.write,https://www.googleapis.com/auth/monitoring.write,https://www.googleapis.com/auth/servicecontrol,https://www.googleapis.com/auth/service.management.readonly,https://www.googleapis.com/auth/trace.append'
        type: string
      project_id:
        description: 'Google Cloud Project ID'
        required: true
        default: 'basic-lock-251300'
        type: string

jobs:
  startup-plex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Define Variables
        id: vars
        run: |
          echo "ZONE=${{ inputs.zone }}" >> $GITHUB_ENV
          echo "MACHINE_TYPE=${{ inputs.machine_type }}" >> $GITHUB_ENV
          echo "DISK_TYPE=${{ inputs.disk_type }}" >> $GITHUB_ENV
          echo "DISK_SIZE=${{ inputs.disk_size }}" >> $GITHUB_ENV
          echo "NETWORK=${{ inputs.network }}" >> $GITHUB_ENV
          echo "NETWORK_TIER=${{ inputs.network_tier }}" >> $GITHUB_ENV
          echo "SERVICE_ACCOUNT=${{ inputs.service_account }}" >> $GITHUB_ENV
          echo "SCOPES=${{ inputs.scopes }}" >> $GITHUB_ENV
          echo "INIT_DATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          echo "DISK_NAME=plex-disk-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          echo "SERVER_NAME=plex-server-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV
          echo "PROJECT_ID=${{ inputs.project_id }}" >> $GITHUB_ENV

      - name: Configure gcloud project
        run: gcloud config set project ${{ env.PROJECT_ID }}

      - name: Get most recent snapshot
        id: snapshot
        run: |
          SNAPSHOT_INFO=$(gcloud compute snapshots list --project=${{ env.PROJECT_ID }} --format="value(name,creationTimestamp)" --sort-by=~creationTimestamp | head -n 1)
          if [ -z "$SNAPSHOT_INFO" ]; then
            echo "No snapshot found. Exiting."
            exit 1
          fi
          MOST_RECENT_SNAPSHOT=$(echo $SNAPSHOT_INFO | awk '{print $1}')
          echo "MOST_RECENT_SNAPSHOT=$MOST_RECENT_SNAPSHOT" >> $GITHUB_ENV
          echo "::set-output name=snapshot_name::$MOST_RECENT_SNAPSHOT"

      - name: Create disk from snapshot
        run: |
          gcloud compute disks create ${{ env.DISK_NAME }} \
            --project=${{ env.PROJECT_ID }} \
            --source-snapshot=${{ env.MOST_RECENT_SNAPSHOT }} \
            --zone=${{ env.ZONE }} \
            --type=${{ env.DISK_TYPE }} \
            --size=${{ env.DISK_SIZE }}

      - name: Create instance from inputs and disk
        run: |
          gcloud compute instances create ${{ env.SERVER_NAME }} \
            --project=${{ env.PROJECT_ID }} \
            --zone=${{ env.ZONE }} \
            --machine-type=${{ env.MACHINE_TYPE }} \
            --network-interface=network=${{ env.NETWORK }},network-tier=${{ env.NETWORK_TIER }} \
            --service-account=${{ env.SERVICE_ACCOUNT }} \
            --scopes=${{ env.SCOPES }} \
            --metadata-from-file=startup-script=gcloud-startup-script.sh \
            --disk=name=${{ env.DISK_NAME }},boot=yes,auto-delete=yes

      - name: Output completion message
        run: echo "Done. Plex server ready."
